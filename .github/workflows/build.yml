name: Pull request checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace --console=plain

  ktlint:
    name: ktlintCheck
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run ktlintCheck
        run: ./gradlew ktlintCheck --no-daemon --stacktrace --console=plain

      - name: Upload ktlint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ktlint-reports
          path: |
            build/reports/ktlint/
            app/build/reports/ktlint/
          if-no-files-found: ignore

  detekt:
    name: Detekt
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Run Detekt
        run: ./gradlew :app:detekt --no-daemon --stacktrace --console=plain

      - name: Upload Detekt reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: app/build/reports/detekt/
          if-no-files-found: ignore

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDKs
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: |
            17
            21
          cache: gradle

      - name: Run unit tests and coverage gate
        run: >
          ./gradlew :app:jacocoUnitTestVerification
          -PunitTestMinCoverage=80
          -PunitTestMinBranchCoverage=60
          --no-daemon --stacktrace --console=plain

      - name: Upload unit test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/jacoco/jacocoUnitTestReport/
            app/build/reports/tests/testDebugUnitTest/
            app/build/test-results/testDebugUnitTest/
          if-no-files-found: ignore

  instrumented-tests:
    name: Instrumented tests (Android 16 x86_64)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out sources
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a
        with:
          api-level: 36
          arch: x86_64
          target: default
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest --no-daemon --stacktrace --console=plain

      - name: Upload instrumented test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: |
            app/build/outputs/androidTest-results/connected/
            app/build/reports/androidTests/connected/
          if-no-files-found: ignore
