name: Check licenses

on: [pull_request, push]

jobs:
  licenses:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 21
          cache: gradle
      - name: Regenerate licenses
        run: ./gradlew generateLicenses --no-daemon
      - name: Fail if assets/licenses.html is out of date
        run: |
          if ! git diff --exit-code -- assets/licenses.html; then
            echo "::error::assets/licenses.html is out of date. Run './gradlew generateLicenses' and commit the result."
            exit 1
          fi
