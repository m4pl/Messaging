config:
  validation: true
  warningsAsErrors: true

complexity:
  LongParameterList:
    active: false
    ignoreDefaultParameters: true
    ignoreAnnotated:
      - Composable
  TooManyFunctions:
    allowedFunctionsPerClass: 60
    allowedFunctionsPerFile: 15
    allowedFunctionsPerInterface: 50
    ignoreAnnotatedFunctions:
      - Preview
      - PreviewLightDark
  LongMethod:
    ignoreAnnotated:
      - Preview
      - PreviewLightDark

coroutines:
  InjectDispatcher:
    active: false
    ignoreAnnotated:
      - Provides

naming:
  FunctionNaming:
    ignoreAnnotated:
      - Composable

style:
  AbstractClassCanBeInterface:
    ignoreAnnotated:
      - Module

  ForbiddenComment:
    active: false

  ForbiddenMethodCall:
    active: true
    methods:
      - reason: >-
          Does not cover the display cutout, so content slides under the camera
          notch in landscape. Use bottomBarInsets(), imeAwareBottomBarInsets()
          or safeDrawingContentPadding() from WindowInsetsExtensions instead.
        value: 'androidx.compose.foundation.layout.navigationBarsPadding'

  MagicNumber:
    ignoreCompanionObjectPropertyDeclaration: true
    ignorePropertyDeclaration: true
    ignoreAnnotated:
      - Composable

  UnusedPrivateFunction:
    ignoreAnnotated:
      - Preview
      - PreviewLightDark
